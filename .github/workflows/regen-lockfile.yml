name: Regenerate lockfile (Linux)

# Regenerates package-lock.json on Linux so it includes the platform-native
# optional deps (@emnapi, @esbuild/*, @rollup/rollup-linux-*, ...) that macOS
# npm strips and that Linux CI's `npm ci` requires. Runs on a feature branch
# and commits the updated lockfile back to that branch. Do NOT target a
# protected branch (the job can't push back to it).
on:
  workflow_dispatch:
  push:
    branches: [chore/dep-hygiene]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate lockfile from package.json
        run: npm install --package-lock-only --no-audit --no-fund
      - name: Commit lockfile if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --staged --quiet; then
            echo "lockfile already in sync — nothing to commit"
          else
            git commit -m "ci: regenerate cross-platform lockfile on Linux [skip ci]"
            git push
          fi
