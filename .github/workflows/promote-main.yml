name: Promotion checks (main)

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit || true  # TODO(#4): make blocking once legacy type errors are fixed
      - name: Lint (incl. complexity limits)
        run: npx eslint .
      - name: Pure-module tests
        run: npm test
      - name: LLM slop check
        run: bash scripts/ci/slop-check.sh
      - name: Expo doctor (dependency/config health)
        run: npx expo-doctor
        continue-on-error: false

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
