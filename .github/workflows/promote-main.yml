name: Promotion checks (main)

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint (incl. complexity limits)
        run: npx eslint .
      - name: Pure-module tests
        run: npm test
      - name: LLM slop check
        run: bash scripts/ci/slop-check.sh
      - name: Expo doctor (dependency/config health)
        run: npx expo-doctor
        # Blocking (TODO#7 resolved): babel-preset-expo/jest realigned to SDK 54,
        # non-CNG app.json check suppressed in package.json. Doctor passes 17/17.

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
